<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Radio Futuro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23000' stroke='%2300ff00' stroke-width='2'/><text x='50' y='60' font-size='60' fill='%2300ff00' text-anchor='middle' font-weight='bold'>🎙</text></svg>">
</head>
<body>

  <div class="app">
    <section class="player">
      <h1>Radio Futuro</h1>
      <p class="credits">Developed by Ignacio Fulgore Ainol</p>
      <button id="playBtn">▶ Play</button>
      <p id="status">Detenido</p>
      <p id="nowPlaying"></p>
    </section>

    <aside class="lyrics-panel">
      <div class="lyrics-header">
        <span>Letra</span>
        <span id="offsetHint" class="offset-hint"></span>
      </div>
      <div id="lyrics" class="lyrics">
        <div class="lyrics-message">Dale Play para ver la letra</div>
      </div>
    </aside>
  </div>

  <audio id="radio"></audio>

  <script src="app.js"></script>
</body>
</html>
